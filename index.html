<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ede8f5;
  --s1:rgba(255,255,255,0.92);
  --s2:rgba(160,120,200,0.32);
  --text:#3d2260;
  --text2:#8a6aaa;
  --text3:#c0a8d8;
  --grad:linear-gradient(135deg,#7B3FA0,#C084C8);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);padding:24px 16px 48px}
.inner{max-width:520px;margin:0 auto}

/* HEADER */
.header{text-align:center;margin-bottom:24px}
.header img{max-width:220px;width:65%;display:block;margin:0 auto 10px}
.header h1{font-size:18px;font-weight:600;color:var(--text)}

/* TABS */
.tabs{display:flex;padding:5px;border-radius:50px;margin-bottom:20px;background:var(--bg);box-shadow:6px 6px 14px var(--s2),-6px -6px 14px var(--s1)}
.tab{flex:1;padding:9px 6px;border:none;background:transparent;color:var(--text2);font-size:13px;border-radius:40px;cursor:pointer;font-family:inherit}
.tab.on{background:var(--grad);color:#fff;font-weight:600}

/* SECTION */
.nm{background:var(--bg);border-radius:20px;box-shadow:6px 6px 14px var(--s2),-6px -6px 14px var(--s1);padding:20px;margin-bottom:16px}
.sec-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid rgba(155,91,174,0.15)}

/* FORM ROWS */
.frow{display:flex;align-items:center;margin-bottom:12px;gap:10px}
.frow label{min-width:180px;font-size:13px;color:var(--text);flex-shrink:0}
.frow input,.frow select{flex:1;padding:9px 13px;border-radius:12px;border:none;background:var(--bg);color:var(--text);font-size:13px;font-family:inherit;outline:none;box-shadow:inset 3px 3px 7px var(--s2),inset -3px -3px 7px var(--s1)}
.frow input::placeholder{color:var(--text3)}
.frow select option{background:#f0ebfa;color:var(--text)}

/* RADIO */
.radio-group{display:flex;flex-direction:column;gap:7px}
.radio-opt{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text)}
.radio-opt input[type=radio]{display:none}
.radio-dot{width:18px;height:18px;border-radius:50%;background:var(--bg);box-shadow:3px 3px 6px var(--s2),-3px -3px 6px var(--s1);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.radio-dot::after{content:'';width:8px;height:8px;border-radius:50%;background:transparent;transition:background .2s}
.radio-opt.sel .radio-dot{box-shadow:inset 3px 3px 6px var(--s2),inset -3px -3px 6px var(--s1)}
.radio-opt.sel .radio-dot::after{background:var(--purple2)}
:root{--purple2:#9B5BAE}

/* RESULT TABLE */
.res-table{width:100%;border-collapse:separate;border-spacing:0 7px}
.res-table td{font-size:13px;padding:4px 0}
.res-table td:first-child{color:var(--text);width:200px}
.res-val{padding:8px 13px!important;border-radius:11px;box-shadow:inset 3px 3px 6px var(--s2),inset -3px -3px 6px var(--s1);color:var(--text);font-weight:600;font-size:13px;min-width:140px}
.ig-val{font-size:17px!important;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* EXAM TABLE */
.ex-table{width:100%;border-collapse:separate;border-spacing:0 6px}
.ex-table th{font-size:11px;color:var(--text2);text-align:left;padding:0 10px 6px;letter-spacing:.5px;text-transform:uppercase}
.ex-table th:last-child,.ex-table td:last-child{text-align:right}
.ex-row td{padding:8px 10px;font-size:12px;color:var(--text)}
.ex-row{background:var(--bg);box-shadow:3px 3px 7px var(--s2),-3px -3px 7px var(--s1);border-radius:11px}
.ex-row.now td{color:#fff}
.ex-row.now{background:var(--grad);box-shadow:4px 4px 9px var(--s2)}
.ex-row.past{opacity:.4}
.ex-row td:first-child{border-radius:11px 0 0 11px}
.ex-row td:last-child{border-radius:0 11px 11px 0}
.bdg{display:inline-block;font-size:9px;padding:2px 6px;border-radius:20px;margin-left:5px;background:rgba(255,255,255,.3);color:#fff;vertical-align:middle}
.bdg.p{background:rgba(0,0,0,.07);color:var(--text2)}

/* BUTTONS */
.btn-clear{padding:8px 20px;border:none;border-radius:50px;background:var(--bg);color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;box-shadow:3px 3px 7px var(--s2),-3px -3px 7px var(--s1)}

/* TWO COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* IMC */
.imc-box{text-align:center;padding:16px;border-radius:15px;box-shadow:inset 4px 4px 10px var(--s2),inset -4px -4px 10px var(--s1);margin-bottom:12px}
.iv{font-size:32px;font-weight:600;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.il{font-size:13px;color:var(--text);font-weight:500;margin-top:3px}
.irow{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:11px;margin-bottom:5px;background:var(--bg);box-shadow:3px 3px 6px var(--s2),-3px -3px 6px var(--s1);font-size:12px;color:var(--text2)}
.irow.me{background:var(--grad);color:#fff}

.hidden{display:none}
</style>
</head>
<body>
<div class="inner">

  <div class="header">
    <img src="https://dramorgana.com.br/wp-content/uploads/2025/10/lgo-horiz.png"
         alt="Clínica de Ultrassom Dra. Morgana Kummer"
         onerror="this.style.display='none';document.getElementById('lf').style.display='block'">
    <div id="lf" style="display:none">
      <p style="font-size:16px;font-weight:600;color:#3d2260">Clínica de Ultrassom</p>
      <p style="font-size:10px;color:#8a6aaa;letter-spacing:1px;text-transform:uppercase;margin-top:2px">Dra. Morgana Kummer</p>
    </div>
  </div>

  <div class="tabs">
    <button class="tab on" onclick="showTab('ig',this)">Calculadora de Idade Gestacional</button>
    <button class="tab" onclick="showTab('imc',this)">IMC</button>
  </div>

  <!-- IG TAB -->
  <div id="tab-ig">

    <div class="nm">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px">
        <div>
          <div style="font-size:12px;color:var(--text2);margin-bottom:8px">Cálculo pela:</div>
          <div class="radio-group" id="radios">
            <label class="radio-opt sel" onclick="setM('dum',this)">
              <div class="radio-dot"></div> Última menstruação
            </label>
            <label class="radio-opt" onclick="setM('dpp',this)">
              <div class="radio-dot"></div> Data prevista do parto
            </label>
            <label class="radio-opt" onclick="setM('exame',this)">
              <div class="radio-dot"></div> Exame anterior
            </label>
          </div>
        </div>
        <button class="btn-clear" onclick="limpar()">Limpar dados</button>
      </div>

      <div style="margin-top:16px">
        <div id="c-dum" class="frow">
          <label>Última menstruação:</label>
          <input type="text" id="dum" placeholder="DD/MM/AAAA" maxlength="10" inputmode="numeric" oninput="mask(this);calc()">
        </div>
        <div id="c-dpp" class="frow hidden">
          <label>Data prevista do parto:</label>
          <input type="text" id="dpp" placeholder="DD/MM/AAAA" maxlength="10" inputmode="numeric" oninput="mask(this);calc()">
        </div>
        <div id="c-exame" class="hidden">
          <div class="frow">
            <label>IG no exame:</label>
            <div style="display:flex;gap:8px;flex:1">
              <input type="number" id="esem" min="4" max="42" placeholder="Sem." style="flex:1" oninput="calc()">
              <input type="number" id="edias" min="0" max="6" placeholder="Dias" style="flex:1" oninput="calc()">
            </div>
          </div>
          <div class="frow">
            <label>Data do exame:</label>
            <input type="text" id="ex" placeholder="DD/MM/AAAA" maxlength="10" inputmode="numeric" oninput="mask(this);calc()">
          </div>
        </div>
      </div>
    </div>

    <div id="res" class="hidden">
      <div class="two-col">
        <div class="nm">
          <div class="sec-title">Datas calculadas</div>
          <table class="res-table">
            <tr><td>Última menstruação:</td><td class="res-val" id="r-dum"></td></tr>
            <tr><td>Concepção provável:</td><td class="res-val" id="r-conc"></td></tr>
            <tr><td>Data provável do parto:</td><td class="res-val" id="r-dpp"></td></tr>
            <tr><td>Idade gestacional:</td><td class="res-val ig-val" id="r-ig"></td></tr>
          </table>
        </div>
        <div class="nm">
          <div class="sec-title">Períodos para exames</div>
          <table class="ex-table">
            <thead><tr><th>Exame</th><th>De</th><th>Até</th></tr></thead>
            <tbody id="exlist"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

  <!-- IMC TAB -->
  <div id="tab-imc" class="hidden">
    <div class="nm">
      <div class="sec-title">Dados</div>
      <div class="frow"><label>Peso (kg):</label><input type="number" id="peso" placeholder="68.5" step="0.1" oninput="calcI()"></div>
      <div class="frow"><label>Altura (cm):</label><input type="number" id="alt" placeholder="163" oninput="calcI()"></div>
    </div>
    <div class="nm hidden" id="ires">
      <div class="imc-box"><div class="iv" id="iv"></div><div class="il" id="il"></div></div>
      <div style="font-size:11px;font-weight:700;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Classificação OMS</div>
      <div id="itab"></div>
    </div>
  </div>

</div>
<script>
let curM='dum';
function showTab(t,btn){
  document.getElementById('tab-ig').classList.toggle('hidden',t!=='ig');
  document.getElementById('tab-imc').classList.toggle('hidden',t!=='imc');
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}
function setM(m,el){
  curM=m;
  document.querySelectorAll('.radio-opt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('c-dum').classList.toggle('hidden',m!=='dum');
  document.getElementById('c-dpp').classList.toggle('hidden',m!=='dpp');
  document.getElementById('c-exame').classList.toggle('hidden',m!=='exame');
  document.getElementById('res').classList.add('hidden');
}
function mask(el){
  let v=el.value.replace(/\D/g,'');
  if(v.length>2)v=v.slice(0,2)+'/'+v.slice(2);
  if(v.length>5)v=v.slice(0,5)+'/'+v.slice(5);
  el.value=v.slice(0,10);
}
function parseD(s){
  const p=s.split('/');if(p.length!==3)return null;
  const d=+p[0],m=+p[1]-1,y=+p[2];
  if(isNaN(d)||isNaN(m)||isNaN(y)||y<1900||y>2100)return null;
  const dt=new Date(y,m,d);
  return(dt.getFullYear()===y&&dt.getMonth()===m&&dt.getDate()===d)?dt:null;
}
function fmt(d){return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});}
const EX=[
  {n:"Morf. 1º tri",si:12,di:0,sf:13,df:4},
  {n:"Morf. 2º tri",si:22,di:0,sf:24,df:0},
  {n:"Obst. 3º tri",si:28,di:0,sf:34,df:0}
];
function calc(){
  let dum=null;
  const hoje=new Date();hoje.setHours(0,0,0,0);
  if(curM==='dum'){dum=parseD(document.getElementById('dum').value);if(!dum)return;}
  else if(curM==='dpp'){const d=parseD(document.getElementById('dpp').value);if(!d)return;dum=new Date(+d-280*864e5);}
  else{
    const s=+document.getElementById('esem').value||0,d=+document.getElementById('edias').value||0;
    const ex=parseD(document.getElementById('ex').value);
    if(!ex||!s)return;dum=new Date(+ex-(s*7+d)*864e5);
  }
  if(!dum||isNaN(dum))return;
  const dpp=new Date(+dum+280*864e5),conc=new Date(+dum+14*864e5),diff=Math.floor((hoje-dum)/864e5);
  document.getElementById('r-dum').textContent=fmt(dum);
  document.getElementById('r-conc').textContent=fmt(conc);
  document.getElementById('r-dpp').textContent=fmt(dpp);
  document.getElementById('r-ig').textContent=Math.floor(diff/7)+'s '+diff%7+'d';
  const tb=document.getElementById('exlist');tb.innerHTML='';
  EX.forEach(ex=>{
    const ini=new Date(+dum+(ex.si*7+ex.di)*864e5),fim=new Date(+dum+(ex.sf*7+ex.df)*864e5);
    const gone=hoje>fim,now=hoje>=ini&&hoje<=fim;
    const tr=document.createElement('tr');tr.className='ex-row'+(now?' now':gone?' past':'');
    const bdg=now?'<span class="bdg">Agora</span>':gone?'<span class="bdg p">Passou</span>':'';
    tr.innerHTML=`<td>${ex.n}${bdg}</td><td>${fmt(ini)}</td><td>${fmt(fim)}</td>`;
    tb.appendChild(tr);
  });
  document.getElementById('res').classList.remove('hidden');
}
function limpar(){
  ['dum','dpp','ex','esem','edias'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
  document.getElementById('res').classList.add('hidden');
}
const OMS=[
  {c:"Abaixo do peso",m:18.5},{c:"Peso normal",m:25},{c:"Sobrepeso",m:30},
  {c:"Obesidade grau I",m:35},{c:"Obesidade grau II",m:40},{c:"Obesidade grau III",m:999}
];
function calcI(){
  const p=+document.getElementById('peso').value,a=+document.getElementById('alt').value;
  const el=document.getElementById('ires');
  if(!p||!a){el.classList.add('hidden');return;}
  const imc=p/((a/100)**2);
  let cat=OMS[OMS.length-1];for(const r of OMS)if(imc<r.m){cat=r;break;}
  document.getElementById('iv').textContent=imc.toFixed(1);
  document.getElementById('il').textContent=cat.c;
  const tab=document.getElementById('itab');tab.innerHTML='';
  OMS.forEach(r=>{const d=document.createElement('div');d.className='irow'+(cat.c===r.c?' me':'');d.innerHTML=`<span>${r.c}</span><span style="opacity:.8;font-size:11px">${r.m===999?'≥ 40.0':'< '+r.m.toFixed(1)}</span>`;tab.appendChild(d);});
  el.classList.remove('hidden');
}
</script>
</body>
</html>
